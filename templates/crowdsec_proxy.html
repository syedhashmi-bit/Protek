<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PROTEK · LAPI · {{ path }}</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#06101c;color:#d6e4f0;font-family:'Share Tech Mono',monospace;font-size:13px}
.bar{position:sticky;top:0;background:#0a1626;border-bottom:1px solid #1b3050;padding:10px 18px;
  display:flex;gap:14px;align-items:center;font-size:12px}
.bar a{color:#00c8ff;text-decoration:none;letter-spacing:.12em;text-transform:uppercase;font-size:11px}
.bar .url{color:#7d94ad;flex:1}
.bar .url b{color:#00ff9d}
.bar .meta{color:#7d94ad;font-size:11px}
pre{margin:0;padding:18px;white-space:pre-wrap;word-break:break-all;color:#00ff9d}
.err{color:#ff3860;padding:18px;background:rgba(255,56,96,.05);border-left:3px solid #ff3860}
</style>
</head>
<body>
<div class="bar">
  <a href="{{ url_for('crowdsec_page') }}">← back</a>
  <div class="url"><b>{{ method }}</b> {{ path }}{% if qs %}?{{ qs }}{% endif %}</div>
  <div class="meta">HTTP {{ status }} · {{ duration_ms }}ms · {{ size }} bytes</div>
</div>
{% if error %}
<div class="err">{{ error }}</div>
{% else %}
<pre>{{ body }}</pre>
{% endif %}
</body>
</html>
