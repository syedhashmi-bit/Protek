<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Protek">
  <title>Protek</title>
  <defs>
    <!-- Cyan glow halo around the shield + glyph -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle vertical gradient inside the shield body — deeper at bottom -->
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a1626"/>
      <stop offset="100%" stop-color="#06101c"/>
    </linearGradient>
  </defs>

  <!-- Angular shield silhouette -->
  <path d="M 32 3
           L 57 11
           L 57 33
           Q 57 49 32 61
           Q 7 49 7 33
           L 7 11 Z"
        fill="url(#shieldFill)"
        stroke="#00c8ff"
        stroke-width="2.2"
        stroke-linejoin="miter"
        filter="url(#glow)"/>

  <!-- Inner "P" — vertical stem + half-loop bowl -->
  <path d="M 22 18
           L 22 47
           M 22 18
           L 35 18
           Q 44 18 44 26
           Q 44 33 35 33
           L 22 33"
        fill="none"
        stroke="#00c8ff"
        stroke-width="3.2"
        stroke-linecap="square"
        stroke-linejoin="miter"
        filter="url(#glow)"/>

  <!-- Neon-green pulse dot — the "active" signal -->
  <circle cx="42" cy="44" r="2.4" fill="#00ff9d">
    <animate attributeName="opacity"
             values="1;0.35;1"
             dur="2.4s"
             repeatCount="indefinite"/>
  </circle>
</svg>
