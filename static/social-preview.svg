<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient — radial cyan glow off-center top -->
    <radialGradient id="bgGlow" cx="35%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#0a1f36" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#06101c"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <!-- Scanline texture (very subtle) -->
    <pattern id="scan" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#00c8ff" fill-opacity="0.015"/>
    </pattern>
    <!-- Shield glow filter -->
    <filter id="shieldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Wordmark soft glow -->
    <filter id="textGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGlow)"/>
  <rect width="1280" height="640" fill="url(#scan)"/>

  <!-- Decorative border frame (NOC vibe) -->
  <rect x="20" y="20" width="1240" height="600" fill="none"
        stroke="#1b3050" stroke-width="1"/>
  <!-- Corner crosshair accents -->
  <g stroke="#00c8ff" stroke-width="2" fill="none">
    <path d="M 20 60 L 20 20 L 60 20"/>
    <path d="M 1220 20 L 1260 20 L 1260 60"/>
    <path d="M 1260 580 L 1260 620 L 1220 620"/>
    <path d="M 60 620 L 20 620 L 20 580"/>
  </g>

  <!-- ─ Icon group on the left ─────────────────────────────────── -->
  <g transform="translate(160, 175) scale(4.5)">
    <!-- Shield -->
    <path d="M 32 3 L 57 11 L 57 33 Q 57 49 32 61 Q 7 49 7 33 L 7 11 Z"
          fill="#06101c"
          stroke="#00c8ff" stroke-width="2.2" stroke-linejoin="miter"
          filter="url(#shieldGlow)"/>
    <!-- Inner "P" -->
    <path d="M 22 18 L 22 47 M 22 18 L 35 18 Q 44 18 44 26 Q 44 33 35 33 L 22 33"
          fill="none"
          stroke="#00c8ff" stroke-width="3.2" stroke-linecap="square" stroke-linejoin="miter"
          filter="url(#shieldGlow)"/>
    <!-- Pulse dot -->
    <circle cx="42" cy="44" r="2.4" fill="#00ff9d"/>
  </g>

  <!-- ─ Wordmark + tagline on the right ────────────────────────── -->
  <!-- Vertical divider line -->
  <line x1="510" y1="180" x2="510" y2="460" stroke="#1b3050" stroke-width="1"/>

  <!-- "PROTEK" big -->
  <text x="560" y="260"
        font-family="'Rajdhani', 'Helvetica Neue', sans-serif"
        font-size="124" font-weight="700"
        letter-spacing="14"
        fill="#00c8ff"
        filter="url(#textGlow)">PROTEK</text>

  <!-- Tagline -->
  <text x="563" y="305"
        font-family="'Share Tech Mono', monospace"
        font-size="22" letter-spacing="4"
        fill="#7d94ad">CROWDSEC  ·  MIKROTIK  ·  NOC</text>

  <!-- Subtitle / pitch -->
  <text x="563" y="380"
        font-family="'Rajdhani', 'Helvetica Neue', sans-serif"
        font-size="34" font-weight="500"
        fill="#d6e4f0">Self-hosted bouncer + dashboard for</text>
  <text x="563" y="420"
        font-family="'Rajdhani', 'Helvetica Neue', sans-serif"
        font-size="34" font-weight="500"
        fill="#d6e4f0">CrowdSec
    <tspan fill="#7d94ad"> → </tspan>
    MikroTik
    <tspan fill="#7d94ad"> + 4 other adapters</tspan>
  </text>

  <!-- Status line -->
  <g transform="translate(563, 470)">
    <rect width="10" height="10" rx="2" fill="#00ff9d">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <text x="22" y="9"
          font-family="'Share Tech Mono', monospace"
          font-size="14" letter-spacing="2"
          fill="#00ff9d">PROTEK 1.0  ·  v1.1 ARC 9 SHIPPED  ·  57 / 80 PHASES</text>
  </g>

  <!-- Bottom-right URL -->
  <text x="1230" y="600"
        font-family="'Share Tech Mono', monospace"
        font-size="14" letter-spacing="2"
        text-anchor="end"
        fill="#4a627e">github.com/syedhashmi-bit/Protek</text>
</svg>
