name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: tests + shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Shell lint (bash -n)
        run: |
          set -e
          while IFS= read -r f; do
            bash -n "$f" && echo "ok: $f"
          done < <(git ls-files '*.sh')

      - name: Run tests
        run: pytest -q

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      # Gate on production deps only (requirements.txt). Test-only deps live in
      # requirements-dev.txt and never ship, so a CVE there shouldn't fail the build.
      - name: Audit production dependencies
        run: pip-audit -r requirements.txt

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      # Build-only smoke: catches Dockerfile / dependency rot. Booting the
      # container would need seeded secrets (SECRET_KEY, admin hash), so that's
      # left out to keep CI deterministic.
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: protek:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
